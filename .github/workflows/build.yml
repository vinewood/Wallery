name: 构建发行版

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm install
      - run: npx tauri build --no-bundle
      - uses: actions/upload-artifact@v4
        with:
          name: Wallery-Windows-x64
          path: src-tauri/target/release/wallery.exe
          if-no-files-found: error

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm install
      - run: npx tauri build --no-bundle --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: Wallery-macOS-ARM64
          path: src-tauri/target/aarch64-apple-darwin/release/wallery
          if-no-files-found: warn

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm install
      - run: npx tauri build --no-bundle --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: Wallery-macOS-Intel
          path: src-tauri/target/x86_64-apple-darwin/release/wallery
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm install
      - run: npx tauri build --no-bundle
      - uses: actions/upload-artifact@v4
        with:
          name: Wallery-Linux-x64
          path: src-tauri/target/release/wallery
          if-no-files-found: error
